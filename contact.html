<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Radiant Glow Skincare</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <a href="index.html" class="logo">Radiant Glow</a>
            <ul class="nav-links">
                <a href="index.html#home">Home</a>
                <a href="about.html">About</a>
                <a href="products.html">Products</a>
                <a href="contact.html" class="active">Contact</a>
            </ul>
            <div class="nav-actions">
                <a href="#cart" class="cart-icon" title="View Cart">
                    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
                    <span id="cart-badge" class="cart-badge">0</span>
                </a>
                <div class="signin-dropdown">
                    <a href="signin.html" class="signin-btn">Sign In</a>
                </div>
            </div>
            <div class="menu-toggle" id="menu-toggle">
                <span></span><span></span><span></span>
            </div>
        </nav>
    </header>
    <section class="contact">
        <h2>Contact Us</h2>
        <form id="contact-form">
            <input type="text" name="name" placeholder="Your Name" required>
            <input type="email" name="email" placeholder="Your Email" required>
            <textarea name="message" placeholder="Your Message" required></textarea>
            <button type="submit">Send Message</button>
        </form>
        <div id="form-message"></div>
    </section>
    <footer>
        <p>&copy; 2025 Radiant Glow Skincare. All rights reserved.</p>
    </footer>

    <!-- Cart Modal -->
<div id="cart-modal" class="modal" style="display:none;">
    <div class="modal-content" style="max-width:400px;margin:auto;">
        <span class="close-modal" id="close-cart-modal" style="float:right;cursor:pointer;font-size:1.5em;">&times;</span>
        <h2>Your Cart</h2>
        <div id="cart-items"></div>
        <button id="go-to-checkout" class="btn cta-btn" style="margin-top:1em;width:100%;">Go to Checkout</button>
    </div>
</div>
<script src="script.js"></script>

<script>
  const currentPage = window.location.pathname.split("/").pop();
  document.querySelectorAll("nav a").forEach(link => {
    if (link.getAttribute("href") === currentPage) {
      link.classList.add("active");
    }
  });
</script>


</body>
</html>
